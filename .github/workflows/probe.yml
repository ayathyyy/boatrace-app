# Phase 0 疎通確認（手動実行のみ）: boatrace.jp / mbrace / lhafile の Go/No-Go 判定
name: probe
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scripts/probe.py
